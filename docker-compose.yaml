services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.local
    container_name: fax_manuscript_ai_web
    command: bash -lc "rm -f tmp/pids/server.pid && bundle install && bin/rails server -b 0.0.0.0 -p 3000"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - bundle_cache:/usr/local/bundle
      - rails_storage:/app/storage
    environment:
      RAILS_ENV: development
      DATABASE_HOST: database
      DATABASE_PORT: 3306
      DATABASE_NAME: fax_manuscript_ai_development
      DATABASE_USERNAME: root
      DATABASE_PASSWORD: password
      TZ: Asia/Tokyo
      RUBYOPT: --parser=parse.y
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      database:
        condition: service_healthy
    stdin_open: true
    tty: true

  database:
    image: mysql:8.0
    container_name: fax_manuscript_ai_database
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: fax_manuscript_ai_development
      TZ: Asia/Tokyo
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_0900_ai_ci
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ppassword"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
  bundle_cache:
  rails_storage:
